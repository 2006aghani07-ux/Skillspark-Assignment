<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses | SkillSpark</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== PAGE BACKGROUND ===== */
body{
    background:#f8f9fc;
    font-family:'Segoe UI', sans-serif;
}

/* section spacing */
.section{
    padding:70px 0;
}

/* heading */
.section-title{
    font-weight:700;
    margin-bottom:40px;
}

/* course cards */
.course-card{
    border:none;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    transition:0.3s;
}

.course-card:hover{
    transform:translateY(-10px);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

/* course images */
.course-card img{
    height:180px;
    object-fit:cover;
}

/* badge styling */
.price-badge{
    font-size:14px;
    padding:6px 10px;
}

/* modal styling */
.modal-content{
    border-radius:15px;
}

/* button styling */
.btn-primary{
    background:#4e73df;
    border:none;
}

.btn-primary:hover{
    background:#375ad3;
}

</style>

</head>
<body>

<!-- ================= COURSES SECTION ================= -->
<div class="container section">
<h2 class="text-center section-title">Our Courses</h2>

<div class="row g-4">

<!-- Course 1 -->
<div class="col-md-4">
<div class="card course-card h-100">
<img src="https://browserstack.wpenginepowered.com/wp-content/uploads/2025/01/What-is-Full-Stack-Web-Development.png" class="card-img-top" alt="Web Development">
<div class="card-body text-center">
<h5>Full Stack Web Development</h5>
<span class="badge bg-success price-badge">$49</span>
<button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#courseModal">Enroll Now</button>
</div>
</div>
</div>

<!-- Course 2 -->
<div class="col-md-4">

<div class="card-body text-center">
<h5>Flutter App Development</h5>
<span class="badge bg-success price-badge">$59</span>
<button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#courseModal">Enroll Now</button>
</div>
</div>
</div>

<div class="col-md-4">

<h5>UI/UX Design</h5>
<span class="badge bg-success price-badge">$39</span>
<button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#courseModal">Enroll Now</button>
</div>
</div>
</div>

<!-- Course 4 -->
<div class="col-md-4">
<div class="card course-card h-100">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQrZ5_I-1S_btRiHI5_59o-sU3a1tUcwmSfQg&s" class="card-img-top" alt="AI">
<div class="card-body text-center">
<h5>Python AI</h5>
<span class="badge bg-success price-badge">$69</span>
<button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#courseModal">Enroll Now</button>
</div>
</div>
</div>

<!-- Course 5 -->
<div class="col-md-4">
<div class="card course-card h-100">

</div>
</div>

<!-- Course 6 -->
<div class="col-md-4">

</div>
</div>
</div>

</div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="courseModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content p-4 text-center">
<h4 class="mb-3">Course Details</h4>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
