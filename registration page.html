<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== Background ===== */
body{
    background-color:#f8f9fc;
    font-family: Arial, Helvetica, sans-serif;
}

/* ===== Section spacing ===== */
.section{
    padding:60px 0;
}

/* ===== Card Styling ===== */
.register-card{
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    padding:35px;
    background:#ffffff;
    transition:0.3s ease;
}

.register-card:hover{
    transform:translateY(-5px);
}

/* ===== Heading ===== */
.section h2{
    color:#2c3e50;
    font-weight:700;
    margin-bottom:20px;
}

/* ===== Form Fields ===== */
.form-control, .form-select{
    border-radius:10px;
    padding:12px;
}

.form-control:focus, .form-select:focus{
    border-color:#4e73df;
    box-shadow:0 0 5px rgba(78,115,223,0.4);
}

/* ===== Radio & Checkbox ===== */
.form-check{
    padding-left:28px;
}

/* ===== Submit Button ===== */
.btn-primary{
    background:#4e73df;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:600;
    transition:0.3s ease;
}

.btn-primary:hover{
    background:#375ad3;
    transform:scale(1.03);
}

/* ===== Icon Image ===== */
.form-icon{
    width:80px;
    margin-bottom:15px;
}
</style>

</head>
<body>

<div class="container section">
<div class="row justify-content-center">
<div class="col-lg-6">

<div class="register-card text-center">

<!-- Icon -->
<img src="https://i.pinimg.com/170x/8c/5e/9d/8c5e9dd58ecd175df019b09f6bac72b6.jpg" class="form-icon" alt="register">

<h2>Register Now</h2>
<p class="text-muted mb-4">Join our courses and start your learning journey</p>

<form class="row g-3">

<div class="col-md-6">
<input type="text" class="form-control" placeholder="Full Name" required>
</div>

<div class="col-md-6">
<input type="email" class="form-control" placeholder="Email Address" required>
</div>

<div class="col-md-12">
<select class="form-select" required>
<option selected disabled>Select Course</option>
<option>Full Stack Web Development</option>
<option>Python AI</option>
<option>Data Science</option>
<option>UI/UX Design</option>
</select>
</div>

<!-- Mode Selection -->
<div class="col-md-6 text-start">
<div class="form-check">
<input class="form-check-input" type="radio" name="mode" id="online">
<label class="form-check-label" for="online">Online</label>
</div>
</div>

<div class="col-md-6 text-start">
<div class="form-check">
<input class="form-check-input" type="radio" name="mode" id="physical">
<label class="form-check-label" for="physical">Physical</label>
</div>
</div>

<div class="col-md-12">
<input type="file" class="form-control">
</div>

<div class="col-md-12 text-start">
<div class="form-check">
<input class="form-check-input" type="checkbox" id="terms">
<label class="form-check-label" for="terms">
I agree to the Terms & Conditions
</label>
</div>
</div>

<div class="col-12">
<button type="submit" class="btn btn-primary w-100"
onclick="alert('Registration Successful!')">
Submit Registration
</button>
</div>

</form>
</div>
</div>
</div>
</div>

</body>
</html>
