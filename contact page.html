<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== Background ===== */
body{
    background-color:#f8f9fc;
    font-family: Arial, Helvetica, sans-serif;
}

/* ===== Section spacing ===== */
.section{
    padding:60px 0;
}

/* ===== Contact Card ===== */
.contact-card{
    background:#ffffff;
    border-radius:15px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s ease;
}

.contact-card:hover{
    transform:translateY(-5px);
}

/* ===== Headings ===== */
.section h2{
    color:#2c3e50;
    font-weight:700;
    margin-bottom:10px;
}

/* ===== Form Fields ===== */
.form-control{
    border-radius:10px;
    padding:12px;
}

.form-control:focus{
    border-color:#1cc88a;
    box-shadow:0 0 5px rgba(28,200,138,0.4);
}

/* ===== Button ===== */
.btn-success{
    background:#1cc88a;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:600;
    transition:0.3s ease;
}

.btn-success:hover{
    background:#17a673;
    transform:scale(1.03);
}

/* ===== Icon ===== */
.contact-icon{
    width:80px;
    margin-bottom:15px;
}

/* ===== Map styling ===== */
.map-frame{
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* ===== Contact Info ===== */
.contact-info{
    font-weight:500;
    color:#2c3e50;
}
</style>

</head>
<body>

<div class="container section">
<div class="row justify-content-center">
<div class="col-lg-7">

<div class="contact-card text-center">

<!-- Icon -->
<img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png" class="contact-icon" alt="contact">

<h2>Contact Us</h2>
<p class="text-muted mb-4">We’d love to hear from you</p>

<form>
<input type="text" class="form-control mb-3" placeholder="Your Name" required>
<input type="email" class="form-control mb-3" placeholder="Email Address" required>
<textarea class="form-control mb-3" rows="4" placeholder="Write your message..." required></textarea>

<button type="submit" class="btn btn-success w-100"
onclick="alert('Message Sent Successfully!')">
Send Message
</button>
</form>

<!-- Map -->
<div class="map-frame mt-4">
<iframe class="w-100" height="300"
src="https://maps.google.com/maps?q=Rawalpindi&t=&z=13&ie=UTF8&iwloc=&output=embed"
loading="lazy"></iframe>
</div>

<p class="mt-4 contact-info">
📍 Rawalpindi, Pakistan <br>
📞 +92 300 0000000
</p>

</div>
</div>
</div>
</div>

</body>
</html>
